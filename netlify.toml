[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Embedder-Policy = "unsafe-none"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://*.r2.dev https://images.unsplash.com https://placehold.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.r2.dev https://*.r2.cloudflarestorage.com wss://*.livekit.cloud https://*.livekit.cloud; media-src 'self' blob: https://*.r2.dev https://assets.mixkit.co; frame-src 'self';"

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_USE_REALTIME = "true"
  VITE_USE_ROBUST_VIDEO_CONFERENCE = "true"
  VITE_LIVEKIT_URL = "wss://aps-construction-6xq7cxyc.livekit.cloud"
  VITE_R2_PUBLIC_DOMAIN = "https://pub-d7eff29dd6bb4a518b9a9d1d4078e61b.r2.dev"
  # VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY should be set in
  # Netlify Dashboard > Site configuration > Environment variables

[[plugins]]
  package = "@netlify/plugin-lighthouse"

[dev]
  framework = "#auto"
  targetPort = 5173

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  VITE_USE_REALTIME = "true"
  VITE_USE_ROBUST_VIDEO_CONFERENCE = "true"
  # Production credentials should be set in Netlify environment variables 